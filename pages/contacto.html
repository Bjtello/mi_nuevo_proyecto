<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/flowbite@4.0.1/dist/flowbite.min.css" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/flowbite@4.0.1/dist/flowbite.min.js"></script>
    <title>Contacto - Corridos Tumbados</title>
</head>

<body class="bg-black bg-gradient-to-br from-black via-red-950 to-black min-h-screen text-white">

<nav class="bg-transparent border-b border-red-900/50 shadow-lg backdrop-blur-sm z-50">
  <div class="max-w-screen-xl flex flex-wrap items-center justify-between mx-auto p-4">
    <a href="../index.html" class="flex items-center space-x-3 rtl:space-x-reverse">
        <img src="../assets/imgs/death-sign.png" class="h-8" style="filter: invert(16%) sepia(99%) saturate(7404%) hue-rotate(4deg) brightness(95%) contrast(118%);" alt="Logo" />
        <span class="self-center text-2xl font-semibold whitespace-nowrap text-white">Corridos Tumbados</span>
    </a>
    <div class="hidden w-full md:block md:w-auto" id="navbar-default">
      <ul class="font-medium flex flex-col p-4 md:p-0 mt-4 rounded-lg md:flex-row md:space-x-8 rtl:space-x-reverse md:mt-0">
        <li><a href="../index.html" class="block py-2 px-3 text-white hover:text-red-500">Home</a></li>
        <li><a href="galeria.html" class="block py-2 px-3 text-white hover:text-red-500">Galeria</a></li>
        <li><a href="artistas.html" class="block py-2 px-3 text-white hover:text-red-500">Artistas</a></li>
        <li><a href="contacto.html" class="block py-2 px-3 text-red-600 font-bold underline">Contacto</a></li>
      </ul>
    </div>
  </div>
</nav>

<section class="w-full max-w-5xl px-6 py-12 mx-auto mt-12 bg-gray-950/80 border border-red-900 rounded-lg shadow-2xl backdrop-blur-md">
    <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
        <div>
            <h2 class="text-3xl font-semibold text-white">Contacto</h2>
            <p class="mt-3 text-gray-400">Rellena el formulario y nos pondremos en contacto contigo.</p>

            <div class="mt-8 space-y-6">
                <div class="flex items-start space-x-3 text-gray-300">
                    <span class="text-red-500">📍</span> <div>Quito, Nueva Aurora </div>
                </div>
                <div class="flex items-start space-x-3 text-gray-300">
                    <span class="text-red-500">📞</span> <div>+593 987 283 265</div>
                </div>
            </div>
        </div>

        <div>
            <form id="contactForm" class="space-y-4" novalidate>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block mb-2 text-sm text-gray-300">Nombre</label>
                        <input name="nombre" required class="w-full px-4 py-2 bg-gray-900 border border-red-900 rounded-md text-white focus:border-red-500 focus:outline-none" type="text" placeholder="Tu nombre">
                    </div>
                    <div>
                        <label class="block mb-2 text-sm text-gray-300">E-mail</label>
                        <input name="email" required class="w-full px-4 py-2 bg-gray-900 border border-red-900 rounded-md text-white focus:border-red-500 focus:outline-none" type="email" placeholder="tu@ejemplo.com">
                    </div>
                </div>
                <div>
                    <label class="block mb-2 text-sm text-gray-300">Mensaje</label>
                    <textarea name="mensaje" required class="w-full h-32 px-4 py-2 bg-gray-900 border border-red-900 rounded-md text-white focus:border-red-500 focus:outline-none" placeholder="Tu mensaje..."></textarea>
                </div>
                <div class="flex justify-end">
                    <button type="submit" class="px-6 py-2 bg-red-700 text-white rounded-md hover:bg-red-600 transition-colors shadow-[0_0_10px_rgba(220,38,38,0.5)]">Enviar mensaje</button>
                </div>
            </form>
        </div>
    </div>
</section>

<footer class="flex justify-center px-4 text-white bg-transparent mt-12 mb-8">
    <div class="container py-6">
        

    
        <hr class="h-px mt-6 border-none bg-gray-800">

        <div class="flex flex-col items-center justify-between mt-6 md:flex-row">
            <div>
                <a href="#" class="text-xl font-bold text-white hover:text-gray-300">Corridos Tumbados VIP</a>
            </div>

            <div class="flex mt-4 md:m-0">
                <div class="-mx-4">
                    <a href="../index.html" class="px-4 text-sm font-medium text-gray-300 hover:text-red-500 hover:underline">Home</a>
                    <a href="galeria.html" class="px-4 text-sm font-medium text-gray-300 hover:text-red-500 hover:underline">Galeria</a>
                    <a href="artistas.html" class="px-4 text-sm font-medium text-gray-300 hover:text-red-500 hover:underline">Artistas</a>
                    <a href="contacto.html" class="px-4 text-sm font-medium text-gray-300 hover:text-red-500 hover:underline">Contacto</a>
                </div>
            </div>
        </div>
    </div>
</footer>

<script>
    document.getElementById('contactForm').addEventListener('submit', function(e){
        e.preventDefault();
        alert('Mensaje enviado con éxito. ¡Estamos en contacto!');
        e.target.reset();
    });
</script>

</body>
</html>
