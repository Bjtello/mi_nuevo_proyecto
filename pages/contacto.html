<body class="bg-gradient-to-r from-fuchsia-600 to-pink-600 min-h-screen">
<nav class="bg-transparent">
  <div class="max-w-screen-xl flex flex-wrap items-center justify-between mx-auto p-4">

        <img src="https://flowbite.com/images/logo.svg" class="h-8" alt="Flowbite Logo" />
        <span class="self-center text-2xl font-semibold whitespace-nowrap dark:text-white">Rokola</span>
    </a>
    <button data-collapse-toggle="navbar-default" type="button" class="inline-flex items-center p-2 w-10 h-10 justify-center text-sm text-gray-500 rounded-lg md:hidden hover:bg-gray-100 focus:outline-none focus:ring-2 focus:ring-gray-200 dark:text-gray-400 dark:hover:bg-gray-700 dark:focus:ring-gray-600" aria-controls="navbar-default" aria-expanded="false">
        <span class="sr-only">Open main menu</span>
        <svg class="w-5 h-5" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 17 14">
            <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M1 1h15M1 7h15M1 13h15"/>
        </svg>
    </button>
    <div class="hidden w-full md:block md:w-auto" id="navbar-default">
      <ul class="font-medium flex flex-col p-4 md:p-0 mt-4 rounded-lg md:flex-row md:space-x-8 rtl:space-x-reverse md:mt-0">
        <li>
          <a href="/index.html" class="block py-2 px-3 text-white rounded-sm md:bg-transparent md:text-white md:p-0 focus:outline-none focus:ring-0" aria-current="page">Home</a>
        </li>
        <li>
          <a href="#" class="block py-2 px-3 text-white rounded-sm hover:bg-white/10 md:hover:bg-transparent md:border-0 md:hover:text-white md:p-0 focus:outline-none focus:ring-0">Galeria</a>
        </li>
        <li>
          <a href="#" class="block py-2 px-3 text-white rounded-sm hover:bg-white/10 md:hover:bg-transparent md:border-0 md:hover:text-white md:p-0 focus:outline-none focus:ring-0">Artistas</a>
        </li>
        <li>
          <a href="pages/contacto.html" class="block py-2 px-3 text-white rounded-sm hover:bg-white/10 md:hover:bg-transparent md:border-0 md:hover:text-white md:p-0 focus:outline-none focus:ring-0">Contacto</a>
        </li>
        <li>
          <a href="#" class="block py-2 px-3 text-white rounded-sm hover:bg-white/10 md:hover:bg-transparent md:border-0 md:hover:text-white md:p-0 focus:outline-none focus:ring-0">Login</a>
        </li>
      </ul>
    </div>
  </div>
</nav>

    <section class="w-full max-w-5xl px-6 py-8 mx-auto bg-white rounded-md shadow-md dark:bg-gray-800">
      <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
        <div>
          <h2 class="text-3xl font-semibold text-gray-800 dark:text-white">Contacto</h2>
          <p class="mt-3 text-gray-600 dark:text-gray-400">Rellena el formulario y nos pondremos en contacto contigo.</p>

          <div class="mt-6 grid grid-cols-1 gap-4 sm:grid-cols-1">
            <div class="flex items-start space-x-3">
              <svg class="w-5 h-5 text-gray-600 mt-1" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M5.05 4.05a7 7 0 119.9 9.9L10 18.9l-4.95-4.95a7 7 0 010-9.9zM10 11a2 2 0 100-4 2 2 0 000 4z" clip-rule="evenodd" /></svg>
              <div>
                <div class="text-sm text-gray-600">121 Street, NY</div>
              </div>
            </div>

            <div class="flex items-start space-x-3">
              <svg class="w-5 h-5 text-gray-600 mt-1" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor"><path d="M2 3a1 1 0 011-1h2.153a1 1 0 01.986.836l.74 4.435a1 1 0 01-.54 1.06l-1.548.773a11.037 11.037 0 006.105 6.105l.774-1.548a1 1 0 011.059-.54l4.435.74a1 1 0 01.836.986V17a1 1 0 01-1 1h-2C7.82 18 2 12.18 2 5V3z" /></svg>
              <div class="text-sm text-gray-600">+2499999666600</div>
            </div>

            <div class="flex items-start space-x-3">
              <svg class="w-5 h-5 text-gray-600 mt-1" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor"><path d="M2.003 5.884L10 9.882l7.997-3.998A2 2 0 0016 4H4a2 2 0 00-1.997 1.884z" /><path d="M18 8.118l-8 4-8-4V14a2 2 0 002 2h12a2 2 0 002-2V8.118z" /></svg>
              <div class="text-sm text-gray-600">example@example.com</div>
            </div>
          </div>
        </div>

        <div>
          <form id="contactForm" class="space-y-4" novalidate>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
              <div>
                <label class="block mb-2 text-sm font-medium text-gray-600 dark:text-gray-200">Nombre</label>
                <input name="nombre" required class="block w-full px-4 py-2 text-gray-700 bg-white border border-gray-300 rounded-md dark:bg-gray-800 dark:text-gray-300 focus:border-blue-500 focus:outline-none focus:ring" type="text" placeholder="Tu nombre">
              </div>
              <div>
                <label class="block mb-2 text-sm font-medium text-gray-600 dark:text-gray-200">E-mail</label>
                <input name="email" required class="block w-full px-4 py-2 text-gray-700 bg-white border border-gray-300 rounded-md dark:bg-gray-800 dark:text-gray-300 focus:border-blue-500 focus:outline-none focus:ring" type="email" placeholder="tu@ejemplo.com">
              </div>
            </div>

            <div>
              <label class="block mb-2 text-sm font-medium text-gray-600 dark:text-gray-200">Mensaje</label>
              <textarea name="mensaje" required class="block w-full h-40 px-4 py-2 text-gray-700 bg-white border border-gray-300 rounded-md dark:bg-gray-800 dark:text-gray-300 focus:border-blue-500 focus:outline-none focus:ring" placeholder="Tu mensaje..."></textarea>
            </div>

            <div class="flex justify-end">
              <button type="submit" class="px-4 py-2 text-white transition-colors duration-200 transform bg-gray-700 rounded-md hover:bg-gray-600 focus:outline-none focus:bg-gray-600">Enviar mensaje</button>
            </div>
          </form>
        </div>
      </div>
    </section>

    <script>
      // Simple submit handler: shows input values (simulated send)
      document.getElementById('contactForm').addEventListener('submit', function(e){
        e.preventDefault();
        const f = e.target;
        const nombre = f.nombre.value.trim();
        const email = f.email.value.trim();
        const mensaje = f.mensaje.value.trim();
        if(!nombre || !email || !mensaje){
          alert('Por favor completa todos los campos.');
          return;
        }
        alert(`Gracias ${nombre} — recibimos tu mensaje:\n\n${mensaje}\n\nResponderemos a: ${email}`);
        f.reset();
      });
    </script>

  </body>
</html>
