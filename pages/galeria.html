<main class="max-w-6xl mx-auto px-4 py-16">
    <div class="text-center mb-12">
        <h1 class="text-3xl sm:text-4xl md:text-5xl font-extrabold text-white uppercase tracking-tight">
            NUESTRA <span class="text-red-600 underline">GALERÍA</span>
        </h1>
        <p class="mt-4 text-gray-400">Haz clic en cualquier imagen para escuchar la pista.</p>
    </div>

    <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-6">
            
        <div class="cursor-pointer overflow-hidden rounded-lg border border-red-900 shadow-[0_0_15px_rgba(220,38,38,0.2)] hover:scale-105 transition-all" onclick="reproducir('../assets/music/excesos.mp3')">
            <img class="h-64 w-full object-cover" src="https://i.postimg.cc/kD3XKB8x/Excesos.jpg" alt="Excesos">
        </div>
       
        <div class="cursor-pointer overflow-hidden rounded-lg border border-red-900 shadow-[0_0_15px_rgba(220,38,38,0.2)] hover:scale-105 transition-all" onclick="reproducir('../assets/music/chula.mp3')">
            <img class="h-64 w-full object-cover object-[center_15%]" src="https://i.postimg.cc/Y9LvFcV1/Chula-Vente.jpg" alt="Chula Vente">
        </div>

        <div class="cursor-pointer overflow-hidden rounded-lg border border-red-900 shadow-[0_0_15px_rgba(220,38,38,0.2)] hover:scale-105 transition-all" onclick="reproducir('../assets/music/marlboro.mp3')">
            <img class="h-64 w-full object-cover" src="https://i.ytimg.com/vi/Fx81kFS96gk/maxresdefault.jpg" alt="Marlboro">
        </div>
            
        <div class="cursor-pointer overflow-hidden rounded-lg border border-red-900 shadow-[0_0_15px_rgba(220,38,38,0.2)] hover:scale-105 transition-all" onclick="reproducir('../assets/music/Amor_su_vida.mp3')">
                <img class="h-64 w-full object-cover" src="https://i.postimg.cc/RFMjkJJm/EL-AMOR-DE-SU-VIDA.jpg" alt="El-AMOR-DE-SU-VIDA">
        </div>

        <div class="cursor-pointer overflow-hidden rounded-lg border border-red-900 shadow-[0_0_15px_rgba(220,38,38,0.2)] hover:scale-105 transition-all" onclick="reproducir('../assets/music/Amor_Tumbado.mp3')">
            <img class="h-64 w-full object-cover" src="https://i.postimg.cc/rmBY8dKr/Amor-Tumbado.jpg" alt="Amor Tumbado">
        </div>

        <div class="cursor-pointer overflow-hidden rounded-lg border border-red-900 shadow-[0_0_15px_rgba(220,38,38,0.2)] hover:scale-105 transition-all" onclick="reproducir('../assets/music/coqueta.mp3')">

                </div>
            </div>
        </div>
    </div>
</footer>

<audio id="reproductorGeneral"></audio>

<script>
    function reproducir(ruta) {
        var audio = document.getElementById("reproductorGeneral");
        // Si ya suena esa canción, la pausa. Si es otra, la carga y suena.
        if (audio.src.includes(ruta) && !audio.paused) {
            audio.pause();
        } else {
            audio.src = ruta;
            audio.play();
        }
    }
</script>

</body>
